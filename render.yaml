services:
  - type: web
    name: ai-api-gateway
    env: node
    plan: free
    region: oregon
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPSTREAM_API_KEY
        sync: false
      - key: UPSTREAM_BASE_URL
        value: https://api.quickrouter.ai
      - key: JWT_SECRET
        generateValue: true
    buildCommand: npm install
    healthCheckPath: /api/health
