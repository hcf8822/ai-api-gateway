<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AIHub</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>

<div class="auth-wrap">
    <div class="auth-card">
        <div class="logo" style="margin-bottom: 24px;">AI<span>Hub</span></div>
        <h1 class="auth-title">欢迎回来</h1>
        <p class="auth-sub">登录你的账户继续使用</p>

        <div id="error" class="form-error" style="display:none;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">用户名或邮箱</label>
                <input type="text" class="form-input" id="username" required placeholder="admin">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="password" required placeholder="至少 6 位">
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 8px;">登录</button>
        </form>

        <div class="auth-footer">
            还没有账户？<a href="register.html">立即注册</a>
        </div>

        <div style="margin-top: 24px; padding: 12px 16px; background: var(--bg-soft); border-radius: 8px; font-size: 12px; color: var(--text-muted); text-align: center;">
            管理员账号: admin / admin123
        </div>
    </div>
</div>

<script>
const API = '';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('error');
    errEl.style.display = 'none';

    try {
        const res = await fetch(API + '/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error?.message || 'Login failed');

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        if (data.user.role === 'admin') {
            window.location.href = 'admin.html';
        } else {
            window.location.href = 'dashboard.html';
        }
    } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
    }
});
</script>

</body>
</html>
